name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:     
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t django-app .

      - name: Run Docker container
        run: |
          docker run -d -p 8000:8000 --name test-app django-app

      - name: Wait for app to start
        run: sleep 5

      - name: Test with curl
        run: curl -f http://localhost:8000
